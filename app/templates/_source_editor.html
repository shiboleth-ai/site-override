<div class="flex flex-col h-full">
    {# Toolbar #}
    <div class="flex items-center justify-between px-4 py-2 bg-gray-900 border-b border-gray-800">
        <span class="text-sm text-gray-400 font-mono">{{ file_path }}</span>
        <div class="flex items-center gap-3">
            <span id="save-status" class="text-sm"></span>
            <form id="source-save-form"
                  action="{{ url_for('main.save_file', domain=domain) }}" method="post"
                  class="inline">
                <input type="hidden" name="path" value="{{ file_path }}">
                <button type="button" id="source-save-btn"
                        class="bg-green-600 hover:bg-green-500 text-white text-sm px-4 py-1.5 rounded
                               transition-colors font-medium">
                    Save
                </button>
            </form>
        </div>
    </div>
    {# Editor #}
    <div class="flex-1 overflow-hidden">
        <textarea id="source-textarea" data-mode="{{ mode }}">{{ content }}</textarea>
    </div>
</div>
